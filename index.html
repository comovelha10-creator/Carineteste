<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZapPedido</title>
<meta name="theme-color" content="#FF4500">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0A0A0A;
    color: #F0F0F0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background animado */
  .bg-glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,69,0,0.12) 0%, transparent 70%);
    top: -200px; left: -200px;
    animation: floatGlow 8s ease-in-out infinite;
    pointer-events: none;
  }
  .bg-glow2 {
    position: fixed;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,53,0.08) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    animation: floatGlow 10s ease-in-out infinite reverse;
    pointer-events: none;
  }
  @keyframes floatGlow {
    0%,100% { transform: translate(0,0); }
    50% { transform: translate(40px, 30px); }
  }

  /* Grid de pontos de fundo */
  .bg-dots {
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .container {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; gap: 48px;
    padding: 32px 24px;
    width: 100%; max-width: 480px;
  }

  /* Logo */
  .logo-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    animation: fadeDown 0.8s ease forwards;
  }
  .logo-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #FF4500, #FF6B35);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem;
    box-shadow: 0 8px 32px rgba(255,69,0,0.35);
  }
  .logo-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.2rem;
    letter-spacing: -0.02em;
  }
  .logo-name span { color: #FF4500; }
  .logo-sub {
    color: #666;
    font-size: 0.9rem;
    text-align: center;
    max-width: 280px;
    line-height: 1.5;
  }

  /* Cards */
  .cards {
    display: flex; flex-direction: column; gap: 16px;
    width: 100%;
    animation: fadeUp 0.8s ease 0.2s forwards;
    opacity: 0;
  }

  .card {
    background: #141414;
    border: 1px solid #222;
    border-radius: 20px;
    padding: 24px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex; align-items: center; gap: 20px;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card.cliente::before {
    background: linear-gradient(135deg, rgba(255,69,0,0.06), transparent);
  }
  .card.painel::before {
    background: linear-gradient(135deg, rgba(34,197,94,0.06), transparent);
  }
  .card:hover { transform: translateY(-4px) scale(1.01); border-color: #333; }
  .card:hover::before { opacity: 1; }
  .card.cliente:hover { border-color: rgba(255,69,0,0.4); box-shadow: 0 12px 40px rgba(255,69,0,0.15); }
  .card.painel:hover { border-color: rgba(34,197,94,0.4); box-shadow: 0 12px 40px rgba(34,197,94,0.15); }

  .card-icon {
    width: 56px; height: 56px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; flex-shrink: 0;
  }
  .card.cliente .card-icon { background: rgba(255,69,0,0.12); }
  .card.painel .card-icon { background: rgba(34,197,94,0.12); }

  .card-text { flex: 1; }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 1.1rem;
    margin-bottom: 4px;
  }
  .card-desc { color: #666; font-size: 0.83rem; line-height: 1.4; }

  .card-arrow {
    color: #333; font-size: 1.2rem;
    transition: all 0.3s; flex-shrink: 0;
  }
  .card:hover .card-arrow { color: #666; transform: translateX(4px); }

  /* Footer */
  .footer {
    color: #333; font-size: 0.75rem;
    animation: fadeUp 0.8s ease 0.4s forwards;
    opacity: 0;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="bg-dots"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <div class="container">
    <div class="logo-wrap">
      <div class="logo-icon">🍔</div>
      <div class="logo-name">Zap<span>Pedido</span></div>
      <p class="logo-sub">Sistema de pedidos online para sua lanchonete</p>
    </div>

    <div class="cards">
      <a href="cliente.html" class="card cliente">
        <div class="card-icon">🛒</div>
        <div class="card-text">
          <div class="card-title">Fazer um Pedido</div>
          <div class="card-desc">Ver cardápio, escolher produtos e finalizar pedido</div>
        </div>
        <div class="card-arrow">›</div>
      </a>

      <a href="painel.html" class="card painel">
        <div class="card-icon">📋</div>
        <div class="card-text">
          <div class="card-title">Painel da Loja</div>
          <div class="card-desc">Gerenciar pedidos, cardápio e acompanhar vendas</div>
        </div>
        <div class="card-arrow">›</div>
      </a>
    </div>

    <p class="footer">ZapPedido © 2025 — Sistema de pedidos online</p>
  </div>
</body>
</html>
