<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZapPedido — Painel da Loja</title>
<meta name="theme-color" content="#0A0A0A">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --brand: #FF4500;
    --brand-dark: #CC3700;
    --bg: #0A0A0A;
    --bg2: #141414;
    --bg3: #1C1C1C;
    --border: #222;
    --text: #F0F0F0;
    --text2: #888;
    --text3: #444;
    --green: #22C55E;
    --yellow: #F59E0B;
    --blue: #3B82F6;
    --purple: #A78BFA;
    --red: #EF4444;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #view-login {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 24px; padding: 36px 28px;
    width: 100%; max-width: 400px;
    animation: fadeIn 0.5s ease;
  }
  .login-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem; margin-bottom: 4px; }
  .login-logo span { color: var(--brand); }
  .login-sub { color: var(--text2); font-size: 0.85rem; margin-bottom: 28px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.78rem; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
  .form-input {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 12px; padding: 13px 14px;
    width: 100%; font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    transition: border-color 0.2s;
  }
  .form-input:focus { outline: none; border-color: var(--brand); }
  .form-input::placeholder { color: var(--text3); }
  .btn-primary {
    background: linear-gradient(135deg, var(--brand), #FF6B35);
    color: white; border: none; border-radius: var(--radius);
    padding: 15px; width: 100%;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(255,69,0,0.3);
    margin-top: 8px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,69,0,0.4); }
  .btn-primary:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
  .login-link { text-align: center; margin-top: 16px; font-size: 0.82rem; color: var(--text2); }
  .login-link a { color: var(--brand); text-decoration: none; }
  .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 10px 14px; font-size: 0.83rem; color: var(--red); margin-bottom: 14px; display: none; }

  /* HEADER DO PAINEL */
  header {
    background: rgba(10,10,10,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; }
  .header-logo span { color: var(--brand); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .loja-badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 50px; padding: 5px 12px; font-size: 0.78rem; color: var(--text2); }
  .logout-btn {
    background: none; border: 1px solid var(--border); color: var(--text2);
    border-radius: 50px; padding: 6px 12px; font-size: 0.78rem; cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* PAINEL */
  #view-painel { display: none; }
  #view-painel.active { display: block; }

  .painel-tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
    background: var(--bg2);
  }
  .painel-tabs::-webkit-scrollbar { display: none; }
  .ptab {
    background: none; border: none; color: var(--text2);
    padding: 14px 20px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.88rem;
    position: relative; border-bottom: 2px solid transparent;
    margin-bottom: -1px; white-space: nowrap; transition: color 0.2s;
  }
  .ptab.active { color: var(--brand); border-bottom-color: var(--brand); }
  .ptab:hover:not(.active) { color: var(--text); }
  .notif-badge {
    background: var(--brand); color: white;
    border-radius: 50px; padding: 1px 6px; font-size: 0.7rem; font-weight: 700; margin-left: 5px;
  }

  .tab-content { display: none; padding: 20px; max-width: 840px; margin: 0 auto; }
  .tab-content.active { display: block; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
  @media(min-width:500px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    animation: fadeIn 0.4s ease;
  }
  .stat-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.7rem; color: var(--brand); }
  .stat-label { color: var(--text2); font-size: 0.75rem; margin-top: 4px; }

  /* PEDIDOS */
  .pedidos-list { display: flex; flex-direction: column; gap: 14px; }
  .pedido-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    transition: all 0.3s; animation: fadeIn 0.4s ease;
  }
  .pedido-card.novo { border-color: var(--brand); box-shadow: 0 0 0 1px var(--brand), 0 4px 24px rgba(255,69,0,0.15); }
  .pedido-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .pedido-id { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--brand); font-size: 1.05rem; }
  .pedido-time { color: var(--text3); font-size: 0.78rem; }
  .status-pill { font-size: 0.72rem; font-weight: 700; padding: 4px 12px; border-radius: 50px; }
  .s-recebido { background: rgba(255,69,0,0.15); color: var(--brand); }
  .s-aceito { background: rgba(59,130,246,0.15); color: var(--blue); }
  .s-preparando { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .s-saiu { background: rgba(167,139,250,0.15); color: var(--purple); }
  .s-entregue { background: rgba(34,197,94,0.15); color: var(--green); }

  .pedido-cliente { font-size: 0.88rem; margin-bottom: 6px; }
  .pedido-endereco { color: var(--text2); font-size: 0.82rem; margin-bottom: 4px; }
  .pedido-info-extra { color: var(--text3); font-size: 0.78rem; margin-bottom: 10px; line-height: 1.5; }

  .pedido-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  .pedido-itens { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .pedido-item { font-size: 0.84rem; display: flex; justify-content: space-between; gap: 8px; }
  .pedido-item-nome { color: var(--text2); flex: 1; }
  .pedido-item-nome strong { color: var(--text); }
  .pedido-item-obs { color: var(--brand); font-size: 0.75rem; font-style: italic; }
  .pedido-item-val { color: var(--text); font-weight: 500; white-space: nowrap; }

  .pedido-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .pedido-total { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--brand); font-size: 1.15rem; }
  .pedido-pagto { font-size: 0.78rem; color: var(--text2); background: var(--bg3); border-radius: 50px; padding: 3px 10px; }

  .pedido-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .act-btn {
    padding: 9px 16px; border-radius: 10px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .act-aceitar { background: var(--brand); color: white; }
  .act-aceitar:hover { background: var(--brand-dark); }
  .act-avancar { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .act-avancar:hover { border-color: var(--yellow); color: var(--yellow); }
  .act-recusar { background: var(--bg3); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .act-recusar:hover { background: rgba(239,68,68,0.08); }

  .empty-pedidos { text-align: center; padding: 48px 20px; color: var(--text2); }
  .empty-pedidos .icon { font-size: 3rem; margin-bottom: 12px; }

  /* CARDÁPIO */
  .cardapio-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .cardapio-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; }
  .add-prod-btn {
    background: var(--brand); color: white; border: none;
    border-radius: 50px; padding: 9px 18px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.83rem;
    cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .add-prod-btn:hover { background: var(--brand-dark); }

  .prod-rows { display: flex; flex-direction: column; gap: 10px; }
  .prod-row {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    animation: fadeIn 0.3s ease;
  }
  .prod-row-img {
    width: 48px; height: 48px; border-radius: 10px;
    background: var(--bg3); object-fit: cover;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; flex-shrink: 0; overflow: hidden;
  }
  .prod-row-img img { width: 100%; height: 100%; object-fit: cover; }
  .prod-row-info { flex: 1; min-width: 0; }
  .prod-row-name { font-weight: 500; font-size: 0.9rem; }
  .prod-row-cat { color: var(--text3); font-size: 0.75rem; margin-top: 2px; }
  .prod-row-price { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--brand); font-size: 0.95rem; flex-shrink: 0; }
  .prod-row-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .mini-btn {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); border-radius: 8px; padding: 5px 10px;
    font-size: 0.75rem; cursor: pointer; transition: all 0.2s;
  }
  .mini-btn:hover { border-color: var(--brand); color: var(--brand); }
  .mini-btn.del:hover { border-color: var(--red); color: var(--red); }
  .disponivel-toggle {
    background: none; border: none; cursor: pointer; font-size: 1.1rem;
    transition: transform 0.2s; flex-shrink: 0;
  }
  .disponivel-toggle:hover { transform: scale(1.2); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2); border-top: 1px solid var(--border);
    border-radius: 24px 24px 0 0; padding: 20px;
    width: 100%; max-width: 560px;
    transform: translateY(40px); transition: transform 0.3s;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 18px; }
  .modal-footer { display: flex; gap: 10px; margin-top: 16px; }
  .btn-cancel {
    background: var(--bg3); color: var(--text2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 13px; flex: 1;
    font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: #444; color: var(--text); }

  .form-textarea {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 12px; padding: 13px 14px;
    width: 100%; font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    transition: border-color 0.2s; resize: vertical; min-height: 76px;
  }
  .form-textarea:focus { outline: none; border-color: var(--brand); }
  .form-textarea::placeholder { color: var(--text3); }

  /* UPLOAD FOTO */
  .upload-area {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 24px; text-align: center; cursor: pointer;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .upload-area:hover { border-color: var(--brand); }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 2rem; margin-bottom: 6px; }
  .upload-text { font-size: 0.82rem; color: var(--text2); }
  .upload-preview {
    width: 100%; max-height: 160px; object-fit: cover;
    border-radius: 10px; margin-top: 10px; display: none;
  }

  /* NOTIF SONORA */
  .novo-badge {
    background: var(--brand); color: white;
    font-size: 0.72rem; font-weight: 700;
    padding: 2px 8px; border-radius: 50px; margin-left: 6px;
    animation: pulseIn 0.5s ease;
  }
  @keyframes pulseIn { from{transform:scale(0)} to{transform:scale(1)} }

  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .loading { text-align: center; padding: 48px; color: var(--text2); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="view-login">
  <div class="login-box">
    <div class="login-logo">Zap<span>Pedido</span></div>
    <div class="login-sub">Painel da loja — faça login para continuar</div>
    <div class="error-msg" id="login-error">Usuário ou senha incorretos.</div>
    <div class="form-group">
      <label>Usuário</label>
      <input type="text" id="login-usuario" class="form-input" placeholder="Seu usuário">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-senha" class="form-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()">
    </div>
    <button class="btn-primary" onclick="fazerLogin()" id="btn-login">Entrar</button>
    <div style="margin-top:12px;text-align:center">
      <a href="index.html" style="color:var(--text3);font-size:0.78rem;text-decoration:none">← Voltar ao início</a>
    </div>
  </div>
</div>

<!-- PAINEL -->
<div id="view-painel">
  <header>
    <div class="header-logo">Zap<span>Pedido</span> <span style="font-size:0.7rem;color:var(--text3);font-weight:400">Painel</span></div>
    <div class="header-right">
      <div class="loja-badge" id="loja-nome-badge">...</div>
      <button class="logout-btn" onclick="fazerLogout()">Sair</button>
    </div>
  </header>

  <div class="painel-tabs">
    <button class="ptab active" onclick="abrirTab('pedidos')" id="tab-btn-pedidos">
      📋 Pedidos <span class="notif-badge" id="notif-novos" style="display:none">0</span>
    </button>
    <button class="ptab" onclick="abrirTab('cardapio')" id="tab-btn-cardapio">🍔 Cardápio</button>
    <button class="ptab" onclick="abrirTab('stats')" id="tab-btn-stats">📊 Resumo</button>
  </div>

  <!-- TAB PEDIDOS -->
  <div id="tab-pedidos" class="tab-content active">
    <div id="pedidos-list" class="pedidos-list">
      <div class="loading"><div class="spinner"></div>Carregando pedidos...</div>
    </div>
  </div>

  <!-- TAB CARDÁPIO -->
  <div id="tab-cardapio" class="tab-content">
    <div class="cardapio-header">
      <div class="cardapio-title">Produtos cadastrados</div>
      <button class="add-prod-btn" onclick="abrirModalProduto()">+ Novo produto</button>
    </div>
    <div id="prod-rows" class="prod-rows">
      <div class="loading"><div class="spinner"></div>Carregando...</div>
    </div>
  </div>

  <!-- TAB STATS -->
  <div id="tab-stats" class="tab-content">
    <div class="stats-grid" id="stats-grid">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- MODAL PRODUTO -->
<div class="modal-overlay" id="modal-produto">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-titulo">Novo produto</div>
    <input type="hidden" id="prod-edit-id">

    <div class="form-group">
      <label>Nome do produto *</label>
      <input type="text" id="prod-nome" class="form-input" placeholder="Ex: X-Burgão">
    </div>
    <div class="form-group">
      <label>Ingredientes</label>
      <input type="text" id="prod-ing" class="form-input" placeholder="Ex: Pão, hamburguer, queijo, alface...">
    </div>
    <div class="form-group">
      <label>Categoria</label>
      <input type="text" id="prod-cat" class="form-input" placeholder="Ex: Lanches, Bebidas, Pizzas...">
    </div>
    <div class="form-group">
      <label>Preço (R$) *</label>
      <input type="number" id="prod-preco" class="form-input" placeholder="0.00" step="0.01" min="0">
    </div>
    <div class="form-group">
      <label>Foto do produto</label>
      <div class="upload-area" id="upload-area">
        <input type="file" id="prod-foto" accept="image/*" onchange="previewFoto(this)">
        <div class="upload-icon">📷</div>
        <div class="upload-text">Toque para escolher uma foto</div>
        <img id="foto-preview" class="upload-preview" alt="preview">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-primary" onclick="salvarProduto()" id="btn-salvar-prod" style="flex:2">Salvar produto</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://hgjhnaxrbrbfngaobxvd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_PzaTPQavkbYmcJQjrMq7ng_OpLlnNPZ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let lojaId = null;
let lojaNome = '';
let pedidos = [];
let produtos = [];
let fotoFile = null;

const STATUS_NEXT = { recebido:'aceito', aceito:'preparando', preparando:'saiu', saiu:'entregue' };
const STATUS_NEXT_LABEL = { recebido:'Aceitar pedido', aceito:'Iniciar preparo', preparando:'Saiu para entrega', saiu:'Marcar entregue' };

// ===== AUTH FIXO =====
const LOGIN_USUARIO = 'Gabriel';
const LOGIN_SENHA = 'Gabriel';

async function fazerLogin() {
  const usuario = document.getElementById('login-usuario').value.trim();
  const senha = document.getElementById('login-senha').value;
  const btn = document.getElementById('btn-login');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (usuario !== LOGIN_USUARIO || senha !== LOGIN_SENHA) {
    errEl.style.display = 'block';
    return;
  }

  btn.textContent = 'Entrando...'; btn.disabled = true;
  await iniciarPainel();
}

function fazerLogout() {
  location.reload();
}

// ===== INICIAR PAINEL =====
async function iniciarPainel() {
  // Pegar primeira loja cadastrada
  const { data: lojas } = await sb.from('lojas').select('*').limit(1);
  if (lojas && lojas.length > 0) {
    lojaId = lojas[0].id;
    lojaNome = lojas[0].nome;
  } else {
    // Nenhuma loja ainda, criar uma padrão
    const { data: novaLoja } = await sb.from('lojas').insert({ nome: 'Minha Loja', descricao: 'Sistema de pedidos' }).select().single();
    lojaId = novaLoja.id;
    lojaNome = novaLoja.nome;
  }

  document.getElementById('view-login').style.display = 'none';
  document.getElementById('view-painel').classList.add('active');
  document.getElementById('loja-nome-badge').textContent = lojaNome;

  carregarPedidos();
  carregarProdutos();
  ouvirNovoPedido();
}

// ===== PEDIDOS =====
async function carregarPedidos() {
  const { data } = await sb.from('pedidos')
    .select('*, itens_pedido(*)')
    .eq('loja_id', lojaId)
    .neq('status', 'entregue')
    .order('criado_em', { ascending: false });
  pedidos = data || [];
  renderPedidos();
  atualizarStats();
}

function renderPedidos() {
  const list = document.getElementById('pedidos-list');
  const novos = pedidos.filter(p => p.status === 'recebido').length;
  const badge = document.getElementById('notif-novos');
  badge.textContent = novos;
  badge.style.display = novos > 0 ? 'inline' : 'none';

  if (pedidos.length === 0) {
    list.innerHTML = '<div class="empty-pedidos"><div class="icon">🎉</div><p>Nenhum pedido em aberto</p></div>';
    return;
  }

  list.innerHTML = pedidos.map(p => {
    const total = Number(p.total);
    const itens = p.itens_pedido || [];
    const hora = new Date(p.criado_em).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
    const isNovo = p.status === 'recebido';
    const nextStatus = STATUS_NEXT[p.status];
    const nextLabel = STATUS_NEXT_LABEL[p.status];

    const extrasHtml = [
      p.ponto_referencia ? `📍 ${p.ponto_referencia}` : '',
      p.obs_entrega ? `📝 ${p.obs_entrega}` : '',
      p.contato ? `📞 ${p.contato}` : ''
    ].filter(Boolean).join(' &nbsp;·&nbsp; ');

    return `
      <div class="pedido-card ${isNovo ? 'novo' : ''}" id="pedido-${p.id}">
        <div class="pedido-top">
          <div>
            <span class="pedido-id">#${String(p.codigo).padStart(4,'0')}</span>
            <span class="pedido-time"> · ${hora}</span>
          </div>
          <span class="status-pill s-${p.status}">${getStatusLabel(p.status)}</span>
        </div>
        <div class="pedido-cliente"><strong>${p.nome_cliente}</strong></div>
        <div class="pedido-endereco">📦 ${p.endereco}</div>
        ${extrasHtml ? `<div class="pedido-info-extra">${extrasHtml}</div>` : ''}
        <hr class="pedido-divider">
        <div class="pedido-itens">
          ${itens.map(it => `
            <div class="pedido-item">
              <span class="pedido-item-nome"><strong>${it.quantidade}x</strong> ${it.nome_produto}${it.observacao ? ` <span class="pedido-item-obs">(${it.observacao})</span>` : ''}</span>
              <span class="pedido-item-val">R$ ${Number(it.subtotal).toFixed(2).replace('.',',')}</span>
            </div>
          `).join('')}
        </div>
        <div class="pedido-total-row">
          <span class="pedido-total">Total: R$ ${total.toFixed(2).replace('.',',')}</span>
          <span class="pedido-pagto">${p.forma_pagamento}</span>
        </div>
        <div class="pedido-actions">
          ${isNovo ? `<button class="act-btn act-aceitar" onclick="avancarStatus('${p.id}','aceito')">✅ Aceitar pedido</button>` : ''}
          ${nextStatus && !isNovo ? `<button class="act-btn act-avancar" onclick="avancarStatus('${p.id}','${nextStatus}')">→ ${nextLabel}</button>` : ''}
          ${isNovo ? `<button class="act-btn act-recusar" onclick="recusarPedido('${p.id}')">✕ Recusar</button>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function getStatusLabel(s) {
  const map = { recebido:'Novo pedido', aceito:'Aceito', preparando:'Preparando', saiu:'Na entrega', entregue:'Entregue' };
  return map[s] || s;
}

async function avancarStatus(id, novoStatus) {
  await sb.from('pedidos').update({ status: novoStatus }).eq('id', id);
  if (novoStatus === 'entregue') pedidos = pedidos.filter(p => p.id !== id);
  else { const p = pedidos.find(p => p.id === id); if (p) p.status = novoStatus; }
  renderPedidos();
  atualizarStats();
}

async function recusarPedido(id) {
  if (!confirm('Recusar este pedido?')) return;
  await sb.from('pedidos').update({ status: 'recusado' }).eq('id', id);
  pedidos = pedidos.filter(p => p.id !== id);
  renderPedidos();
}

function ouvirNovoPedido() {
  sb.channel('novos-pedidos-' + lojaId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'pedidos',
      filter: `loja_id=eq.${lojaId}`
    }, async payload => {
      // Buscar itens do novo pedido
      const { data: itens } = await sb.from('itens_pedido').select('*').eq('pedido_id', payload.new.id);
      const novoPedido = { ...payload.new, itens_pedido: itens || [] };
      pedidos.unshift(novoPedido);
      renderPedidos();
      atualizarStats();
      tocarSom();
    })
    .subscribe();
}

function tocarSom() {
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(660, ctx.currentTime + 0.1);
    osc.frequency.setValueAtTime(880, ctx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

// ===== STATS =====
async function atualizarStats() {
  const { data: todos } = await sb.from('pedidos').select('total,status').eq('loja_id', lojaId);
  const entregues = (todos || []).filter(p => p.status === 'entregue');
  const emAberto = (todos || []).filter(p => !['entregue','recusado'].includes(p.status));
  const faturamento = entregues.reduce((s,p) => s + Number(p.total), 0);
  const hoje = new Date().toDateString();
  const { data: pedidosHoje } = await sb.from('pedidos').select('total,status').eq('loja_id', lojaId).gte('criado_em', new Date().toISOString().split('T')[0]);
  const faturamentoHoje = (pedidosHoje || []).filter(p => p.status === 'entregue').reduce((s,p) => s + Number(p.total), 0);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-val">${(todos||[]).length}</div><div class="stat-label">Total de pedidos</div></div>
    <div class="stat-card"><div class="stat-val">${emAberto.length}</div><div class="stat-label">Em aberto agora</div></div>
    <div class="stat-card"><div class="stat-val">R$ ${faturamentoHoje.toFixed(2).replace('.',',')}</div><div class="stat-label">Faturamento hoje</div></div>
    <div class="stat-card"><div class="stat-val">R$ ${faturamento.toFixed(2).replace('.',',')}</div><div class="stat-label">Faturamento total</div></div>
  `;
}

// ===== PRODUTOS =====
async function carregarProdutos() {
  const { data } = await sb.from('produtos').select('*').eq('loja_id', lojaId).order('categoria');
  produtos = data || [];
  renderProdutos();
}

function renderProdutos() {
  const rows = document.getElementById('prod-rows');
  if (produtos.length === 0) {
    rows.innerHTML = '<div class="empty-pedidos"><div class="icon">🍽️</div><p>Nenhum produto cadastrado ainda</p></div>';
    return;
  }
  rows.innerHTML = produtos.map(p => {
    const imgHtml = p.foto_url
      ? `<div class="prod-row-img"><img src="${p.foto_url}" alt="${p.nome}"></div>`
      : `<div class="prod-row-img">${getCatEmoji(p.categoria)}</div>`;
    return `
      <div class="prod-row">
        ${imgHtml}
        <div class="prod-row-info">
          <div class="prod-row-name">${p.nome}</div>
          <div class="prod-row-cat">${p.categoria || 'Sem categoria'}</div>
        </div>
        <div class="prod-row-price">R$ ${Number(p.preco).toFixed(2).replace('.',',')}</div>
        <button class="disponivel-toggle" onclick="toggleDisponivel('${p.id}',${p.disponivel})" title="${p.disponivel ? 'Disponível (clique para pausar)' : 'Pausado (clique para ativar)'}">${p.disponivel ? '✅' : '⏸️'}</button>
        <div class="prod-row-actions">
          <button class="mini-btn" onclick="editarProduto('${p.id}')">✏️</button>
          <button class="mini-btn del" onclick="deletarProduto('${p.id}')">🗑</button>
        </div>
      </div>
    `;
  }).join('');
}

function getCatEmoji(cat) {
  const map = { 'Lanches':'🍔','Bebidas':'🥤','Pizzas':'🍕','Sobremesas':'🍰','Porções':'🍟','Sucos':'🍹' };
  return map[cat] || '🍽️';
}

async function toggleDisponivel(id, atual) {
  await sb.from('produtos').update({ disponivel: !atual }).eq('id', id);
  const p = produtos.find(p => p.id === id);
  if (p) p.disponivel = !atual;
  renderProdutos();
}

async function deletarProduto(id) {
  if (!confirm('Excluir este produto?')) return;
  await sb.from('produtos').delete().eq('id', id);
  produtos = produtos.filter(p => p.id !== id);
  renderProdutos();
}

function editarProduto(id) {
  const p = produtos.find(p => p.id === id);
  if (!p) return;
  document.getElementById('modal-titulo').textContent = 'Editar produto';
  document.getElementById('prod-edit-id').value = p.id;
  document.getElementById('prod-nome').value = p.nome;
  document.getElementById('prod-ing').value = p.ingredientes || '';
  document.getElementById('prod-cat').value = p.categoria || '';
  document.getElementById('prod-preco').value = p.preco;
  if (p.foto_url) {
    const prev = document.getElementById('foto-preview');
    prev.src = p.foto_url; prev.style.display = 'block';
  }
  abrirModal();
}

function abrirModalProduto() {
  document.getElementById('modal-titulo').textContent = 'Novo produto';
  document.getElementById('prod-edit-id').value = '';
  document.getElementById('prod-nome').value = '';
  document.getElementById('prod-ing').value = '';
  document.getElementById('prod-cat').value = '';
  document.getElementById('prod-preco').value = '';
  document.getElementById('foto-preview').style.display = 'none';
  fotoFile = null;
  abrirModal();
}

function previewFoto(input) {
  if (input.files && input.files[0]) {
    fotoFile = input.files[0];
    const reader = new FileReader();
    reader.onload = e => {
      const prev = document.getElementById('foto-preview');
      prev.src = e.target.result; prev.style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

async function salvarProduto() {
  const editId = document.getElementById('prod-edit-id').value;
  const nome = document.getElementById('prod-nome').value.trim();
  const ing = document.getElementById('prod-ing').value.trim();
  const cat = document.getElementById('prod-cat').value.trim();
  const preco = parseFloat(document.getElementById('prod-preco').value);
  const btn = document.getElementById('btn-salvar-prod');

  if (!nome) { alert('Informe o nome do produto.'); return; }
  if (!preco || preco <= 0) { alert('Informe um preço válido.'); return; }

  btn.textContent = 'Salvando...'; btn.disabled = true;

  let foto_url = null;

  // Upload da foto
  if (fotoFile) {
    const ext = fotoFile.name.split('.').pop();
    const path = `${lojaId}/${Date.now()}.${ext}`;
    const { data: up, error: upErr } = await sb.storage.from('imagem produto').upload(path, fotoFile, { upsert: true });
    if (!upErr) {
      const { data: urlData } = sb.storage.from('imagem produto').getPublicUrl(path);
      foto_url = urlData.publicUrl;
    }
  }

  const payload = {
    loja_id: lojaId,
    nome, ingredientes: ing, categoria: cat,
    preco: Math.round(preco * 100) / 100,
    disponivel: true,
    ...(foto_url ? { foto_url } : {})
  };

  if (editId) {
    await sb.from('produtos').update(payload).eq('id', editId);
  } else {
    await sb.from('produtos').insert(payload);
  }

  fecharModal();
  carregarProdutos();
  btn.textContent = 'Salvar produto'; btn.disabled = false;
}

function abrirModal() { document.getElementById('modal-produto').classList.add('show'); }
function fecharModal() { document.getElementById('modal-produto').classList.remove('show'); }

// ===== TABS =====
function abrirTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('tab-btn-' + tab).classList.add('active');
  if (tab === 'stats') atualizarStats();
}

document.getElementById('modal-produto').addEventListener('click', function(e) {
  if (e.target === this) fecharModal();
});
</script>
</body>
